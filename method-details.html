<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Method Details | SpinTask</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-body">

    <!-- Header -->
    <header class="glass">
        <div class="container container-nav">
            <nav>
                <a href="index.html" class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="#39ff14" stroke-width="2" />
                        <circle cx="20" cy="20" r="4" fill="#39ff14" />
                    </svg>
                    SpinTask<span>.</span>
                </a>
                <div class="auth-btns">
                    <a href="index.html" class="btn btn-outline">← Back Home</a>
                </div>
            </nav>
        </div>
    </header>

    <main style="padding: 100px 0 60px;">
        <div class="container" style="max-width: 800px;">
            <div id="loading-state" style="text-align: center; padding: 50px;">
                <p style="color: var(--text-muted);">Loading method details...</p>
            </div>

            <div id="method-content" class="glass" style="display: none; padding: 40px; border-radius: 25px;">
                <div style="text-align: center; margin-bottom: 30px;">
                    <div id="method-icon" style="font-size: 4rem; margin-bottom: 15px;">📋</div>
                    <h1 id="method-name" style="font-size: 2.5rem; margin-bottom: 10px;">Method Name</h1>
                    <p id="method-short" style="color: var(--primary-neon); font-weight: 600; font-size: 1.1rem;">Short description goes here.</p>
                </div>

                <div id="method-full" style="line-height: 1.8; color: var(--text-white); font-size: 1.1rem; margin-bottom: 40px;">
                    <!-- Full details populated here -->
                </div>

                <div style="text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px;">
                    <a id="get-started-btn" href="#" class="btn btn-primary" style="padding: 15px 40px; font-size: 1.1rem;">GET STARTED NOW</a>
                </div>
            </div>

            <div id="error-state" style="display: none; text-align: center; padding: 50px;">
                <h2 style="color: #ff4d4d;">Method Not Found</h2>
                <p style="margin-top: 15px; color: var(--text-muted);">The earning method you are looking for does not exist or has been removed.</p>
                <a href="index.html" class="btn btn-outline" style="margin-top: 25px;">Back to Home</a>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const methodId = params.get('id');

            if (!methodId) {
                showError();
                return;
            }

            const methods = Admin.getDb(Admin.DB_METHODS);
            const method = methods.find(m => m.id === methodId);

            if (!method) {
                showError();
                return;
            }

            renderMethod(method);
        });

        function renderMethod(m) {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('method-content').style.display = 'block';

            document.getElementById('method-icon').innerText = m.icon;
            document.getElementById('method-name').innerText = m.name;
            document.getElementById('method-short').innerText = m.shortDesc;
            document.getElementById('method-full').innerText = m.fullDetails;
            document.getElementById('get-started-btn').href = m.url || '#';
            
            document.title = `${m.name} | SpinTask Details`;
        }

        function showError() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
        }
    </script>
</body>

</html>
