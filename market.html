<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Market | SpinTask</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-body">

    <!-- Header -->
    <header class="glass" style="position: sticky; top: 0; z-index: 1000;">
        <div class="container container-nav">
            <nav>
                <a href="index.html" class="logo">
                    SpinTask<span>.</span>
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="market.html" class="active">Market</a></li>
                    <li><a href="tasks.html">Tasks</a></li>
                    <li><a href="support.html">Support</a></li>
                </ul>
                <div class="auth-btns">
                    <a href="dashboard.html" class="btn btn-primary">Dashboard</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 60px 20px;">
        <div class="section-title" style="text-align: left; margin-bottom: 40px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Live Crypto Market</h1>
            <p style="color: var(--text-muted);">Real-time prices for the top 50 cryptocurrencies by market cap.</p>
        </div>

        <div class="search-bar-container">
            <input type="text" id="market-search" class="search-input"
                placeholder="Search coin name or symbol (e.g. BTC)...">
        </div>

        <div class="market-table-container glass" style="padding: 20px; border-radius: 15px;">
            <table class="market-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Price (USD)</th>
                        <th>24h Change</th>
                        <th>Market Cap</th>
                    </tr>
                </thead>
                <tbody id="market-table-body">
                    <!-- Populated by market.js -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Footer -->
    <footer class="glass" style="margin-top: 100px;">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 SpinTask. Data provided by CoinGecko API.
            </div>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/market.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
