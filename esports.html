<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSports | SpinTask Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sport-page.css">
</head>
<body class="sport-page-body">
    <header class="glass" style="position:sticky;top:0;z-index:100;background:rgba(8,11,16,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);">
        <div class="container container-nav" style="height:56px;">
            <a href="index.html" class="logo" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:#39ff14;font-weight:700;">
                <svg width="26" height="26" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#39ff14" stroke-width="2"/><circle cx="20" cy="20" r="4" fill="#39ff14"/></svg>
                SpinTask<span style="color:#fff;">.</span>
            </a>
            <nav style="display:flex;gap:16px;align-items:center;font-size:0.85rem;">
                <a href="sports.html" style="color:#ffaa00;font-weight:700;text-decoration:none;">🏅 Sports</a>
                <a href="cricket.html"  style="color:#6b7280;text-decoration:none;">Cricket</a>
                <a href="football.html" style="color:#6b7280;text-decoration:none;">Football</a>
                <a href="dashboard.html" class="btn btn-primary" style="padding:7px 16px;font-size:0.82rem;">Dashboard</a>
            </nav>
        </div>
    </header>

    <section class="sp-hero">
        <div class="container">
            <span class="sp-sport-icon">🎮</span>
            <h1>eSports</h1>
            <p class="sp-hero-sub">CS2, Valorant, Dota 2, PUBG — live maps, round-by-round scores and odds.</p>
            <div class="sp-stats-strip">
                <div class="sp-stat-pill"><span id="live-count">0</span> Live Now</div>
                <div class="sp-stat-pill"><span id="upcoming-count">0</span> Upcoming</div>
                <div class="sp-stat-pill"><span>4</span> Tournaments</div>
            </div>
        </div>
    </section>

    <main></main>

    <!-- Firebase SDK (V8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/sport-page.js"></script>
    <script>SportPage.init({ sport: 'esports' });</script>
</body>
</html>
