<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SpinTask</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-toast {
            background: #ff4d4d;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .success-toast {
            background: #39ff14;
            color: #1a1a1a;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
            font-weight: 600;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .step-container {
            display: none;
        }

        .step-active {
            display: block;
        }

        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-digit {
            width: 45px;
            height: 55px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .otp-digit:focus {
            border-color: var(--primary-neon);
            background: rgba(57, 255, 20, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .reset-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="auth-page">
    <!-- Back Button -->
    <a href="login.html" class="glass"
        style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; border-radius: 10px; display: flex; align-items: center; gap: 8px; color: #fff; text-decoration: none; font-size: 0.9rem; z-index: 10;">
        <span style="font-size: 1.2rem;">←</span> Back to Login
    </a>

    <div class="auth-card glass">
        <div class="reset-header">
            <h2>Reset Password</h2>
            <p id="step-hint">Enter your email to receive a reset code.</p>
        </div>

        <div id="error-toast" class="error-toast"></div>
        <div id="success-toast" class="success-toast"></div>

        <!-- Step 1: Email -->
        <div id="step-1" class="step-container step-active">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="example@domain.com" required>
            </div>
            <button class="btn btn-primary" id="btn-request-otp" onclick="handleRequestOTP()">
                <span class="btn-text">Send Reset Code</span>
                <div class="loading-spinner"></div>
            </button>
        </div>

        <!-- Step 2: OTP -->
        <div id="step-2" class="step-container">
            <p style="text-align: center; font-size: 0.85rem; margin-bottom: 10px;">A 6-digit code was sent to <b id="display-email"></b></p>
            <div class="otp-input-group">
                <input type="text" maxlength="1" class="otp-digit" onkeyup="moveFocus(this, 'd2')">
                <input type="text" maxlength="1" class="otp-digit" id="d2" onkeyup="moveFocus(this, 'd3')">
                <input type="text" maxlength="1" class="otp-digit" id="d3" onkeyup="moveFocus(this, 'd4')">
                <input type="text" maxlength="1" class="otp-digit" id="d4" onkeyup="moveFocus(this, 'd5')">
                <input type="text" maxlength="1" class="otp-digit" id="d5" onkeyup="moveFocus(this, 'd6')">
                <input type="text" maxlength="1" class="otp-digit" id="d6">
            </div>
            <button class="btn btn-primary" id="btn-verify-otp" onclick="handleVerifyOTP()">
                <span class="btn-text">Verify Code</span>
                <div class="loading-spinner"></div>
            </button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.8rem;">
                Didn't get the code? <a href="#" onclick="handleRequestOTP()" style="color: var(--primary-neon);">Resend</a>
            </p>
        </div>

        <!-- Step 3: New Password -->
        <div id="step-3" class="step-container">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>
            <button class="btn btn-primary" id="btn-reset-pw" onclick="handleReset()">
                <span class="btn-text">Update Password</span>
                <div class="loading-spinner"></div>
            </button>
        </div>
    </div>

    <!-- Firebase SDK (V8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        let currentEmail = '';
        let currentOTP = '';

        function moveFocus(current, nextId) {
            if (current.value.length === 1) {
                const nextField = document.getElementById(nextId);
                if (nextField) nextField.focus();
            }
        }

        function showMessage(type, text) {
            const err = document.getElementById('error-toast');
            const succ = document.getElementById('success-toast');
            err.style.display = 'none';
            succ.style.display = 'none';

            const target = type === 'error' ? err : succ;
            target.innerText = text;
            target.style.display = 'block';
            setTimeout(() => target.style.display = 'none', 5000);
        }

        function toggleLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const text = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.loading-spinner');
            if (isLoading) {
                text.style.display = 'none';
                spinner.style.display = 'block';
                btn.disabled = true;
            } else {
                text.style.display = 'block';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        }

        async function handleRequestOTP() {
            const email = document.getElementById('email').value.trim();
            if (!email) { showMessage('error', 'Please enter your email.'); return; }

            toggleLoading('btn-request-otp', true);
            try {
                const res = await Auth.requestPasswordReset(email);
                currentEmail = email;
                
                // Simulation: In a real app, this would BE SENT to email.
                // For this project, we'll alert it so the user can see it.
                alert(`[SIMULATION] Your 6-digit code is: ${res.otp}\n(In production, this would be sent to your email inbox)`);
                
                document.getElementById('display-email').innerText = email;
                document.getElementById('step-1').classList.remove('step-active');
                document.getElementById('step-2').classList.add('step-active');
                document.getElementById('step-hint').innerText = 'Enter the 6-digit code mailed to you.';
                showMessage('success', 'Reset code sent!');
            } catch (err) {
                showMessage('error', err.message);
            } finally {
                toggleLoading('btn-request-otp', false);
            }
        }

        async function handleVerifyOTP() {
            const digits = Array.from(document.querySelectorAll('.otp-digit')).map(i => i.value).join('');
            if (digits.length < 6) { showMessage('error', 'Please enter all 6 digits.'); return; }

            toggleLoading('btn-verify-otp', true);
            try {
                await Auth.verifyOTP(currentEmail, digits);
                currentOTP = digits;
                document.getElementById('step-2').classList.remove('step-active');
                document.getElementById('step-3').classList.add('step-active');
                document.getElementById('step-hint').innerText = 'Set a strong new password.';
                showMessage('success', 'Code verified! Enter new password.');
            } catch (err) {
                showMessage('error', err.message);
            } finally {
                toggleLoading('btn-verify-otp', false);
            }
        }

        async function handleReset() {
            const pw = document.getElementById('new-password').value;
            const cfm = document.getElementById('confirm-password').value;

            if (pw.length < 6) { showMessage('error', 'Password must be at least 6 characters.'); return; }
            if (pw !== cfm) { showMessage('error', 'Passwords do not match.'); return; }

            toggleLoading('btn-reset-pw', true);
            try {
                await Auth.resetPassword(currentEmail, currentOTP, pw);
                showMessage('success', 'Password updated! Redirecting to login...');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (err) {
                showMessage('error', err.message);
            } finally {
                toggleLoading('btn-reset-pw', false);
            }
        }
    </script>
</body>

</html>
