<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details | SpinTask Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sport-page.css">
</head>
<body class="sport-page-body">

    <!-- Nav Header -->
    <header class="glass" style="position:sticky;top:0;z-index:100;background:rgba(8,11,16,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);padding:0;">
        <div class="container container-nav" style="height:56px;">
            <a href="sports.html" class="logo" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:#39ff14;font-weight:700;font-size:1rem;">
                <svg width="26" height="26" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#39ff14" stroke-width="2"/><circle cx="20" cy="20" r="4" fill="#39ff14"/></svg>
                SpinTask<span style="color:#fff;">.</span>
            </a>
            <nav style="display:flex;gap:20px;align-items:center;">
                <a href="sports.html" style="color:#6b7280;font-size:0.85rem;text-decoration:none;">🏅 Sports</a>
                <a href="dashboard.html" class="btn btn-primary" style="padding:7px 16px;font-size:0.82rem;">Dashboard</a>
            </nav>
        </div>
    </header>

    <!-- Content injected by JS -->
    <div id="match-detail-root">
        <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
            <div style="text-align:center;color:#6b7280;">
                <div style="font-size:2rem;margin-bottom:12px;">⚽</div>
                <div class="sp-loading-dots" style="font-size:0.9rem;">Loading match</div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>
    <script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const matchId = params.get('id');
        const root = document.getElementById('match-detail-root');

        if (!matchId) {
            root.innerHTML = '<div style="text-align:center;padding:60px;color:#6b7280;">No match ID specified. <a href="sports.html" style="color:#39ff14;">← Back to Sports</a></div>';
            return;
        }

        let ti = null; // poll interval

        function formatStatus(status) {
            if (status === 'live')      return `<span class="sp-status-badge live"><span class="sp-live-dot"></span> LIVE</span>`;
            if (status === 'upcoming')  return `<span class="sp-status-badge upcoming">📅 UPCOMING</span>`;
            return `<span class="sp-status-badge completed">✓ COMPLETED</span>`;
        }

        function formatStartTime(iso) {
            if (!iso) return '';
            try {
                const d = new Date(iso);
                return d.toLocaleString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
            } catch(e) { return iso; }
        }

        function renderCommentary(commentary) {
            if (!commentary || !commentary.length)
                return `<div class="sp-commentary-empty">No commentary yet.</div>`;
            return (commentary || []).map((line, i) => {
                const overMatch = line.match(/^([\d.]+)\s*[—–-]/);
                const overLabel = overMatch ? `<span class="sp-over-label">${overMatch[1]}</span>` : '';
                const cleaned  = overMatch ? line.replace(overMatch[0], '').trim() : line;
                return `<div class="sp-commentary-item">${overLabel}${cleaned}</div>`;
            }).join('');
        }

        function renderStats(stats, sport) {
            if (!stats || !Object.keys(stats).length) return '';
            const rows = Object.entries(stats).map(([key, val]) => {
                const parts = val.split ? val.split(/\s*[–-]\s*/) : [val];
                const homeVal = parts[0] || '';
                const awayVal = parts[1] || '';
                return `<tr>
                    <td>${key.replace(/([A-Z])/g,' $1').trim()}</td>
                    <td>${homeVal}</td>
                    <td style="text-align:center;color:#6b7280;font-size:0.7rem;">vs</td>
                    <td>${awayVal}</td>
                </tr>`;
            }).join('');
            return `
              <div class="card" style="background:#0f1318;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:20px;margin-top:20px;">
                <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:14px;">📊 Match Stats</h3>
                <table class="sp-stats-table">
                  <thead><tr>
                    <th style="color:#6b7280;font-size:0.72rem;padding:6px 16px;">Category</th>
                    <th style="text-align:center;font-size:0.72rem;color:#4d9fff;">Home</th>
                    <th></th>
                    <th style="text-align:right;font-size:0.72rem;color:#ffaa00;">Away</th>
                  </tr></thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>`;
        }

        function renderOdds(m) {
            if (!m.oddsA) return '';
            const drawBtn = m.oddsDraw && m.oddsDraw !== '-'
                ? `<div class="sp-odd-btn"><span class="sp-odd-label">Draw</span><span class="sp-odd-val">${m.oddsDraw}</span></div>` : '';
            return `
              <div style="margin-top:16px;">
                <div style="font-size:0.75rem;color:#6b7280;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Visual Odds (Informational Only)</div>
                <div class="sp-odds-row">
                  <div class="sp-odd-btn"><span class="sp-odd-label">${m.teamA}</span><span class="sp-odd-val">${m.oddsA}</span></div>
                  ${drawBtn}
                  <div class="sp-odd-btn"><span class="sp-odd-label">${m.teamB}</span><span class="sp-odd-val">${m.oddsB}</span></div>
                </div>
              </div>`;
        }

        function renderMatch(m) {
            if (!m) {
                root.innerHTML = '<div style="text-align:center;padding:60px;color:#6b7280;">Match not found. <a href="sports.html" style="color:#39ff14;">← Back</a></div>';
                return;
            }
            document.title = `${m.teamA} vs ${m.teamB} | SpinTask Sports`;
            const isLive = m.status === 'live';

            root.innerHTML = `
              <!-- Hero Scoreboard -->
              <section class="sp-detail-hero" style="padding:30px 0;">
                <div class="container">
                  <!-- Back link -->
                  <a href="${m.sport ? m.sport+'.html' : 'sports.html'}" style="display:inline-flex;align-items:center;gap:6px;color:#6b7280;font-size:0.82rem;text-decoration:none;margin-bottom:20px;">
                    ← Back to ${(m.sport||'Sports').charAt(0).toUpperCase()+(m.sport||'Sports').slice(1)}
                  </a>

                  <div class="sp-scoreboard ${isLive ? 'live-glow' : ''}">
                    <div class="sp-sb-status">${formatStatus(m.status)}</div>
                    <div class="sp-scoreboard-teams">
                      <div class="sp-sb-team" style="text-align:center;">
                        <span class="sp-sb-flag">${m.flagA || '🏳'}</span>
                        <div class="sp-sb-name">${m.teamA}</div>
                      </div>
                      <div class="sp-sb-score ${isLive ? 'live-score' : ''}">
                        ${m.scoreA || (isLive ? '0':'–')} – ${m.scoreB || (isLive ? '0':'–')}
                      </div>
                      <div class="sp-sb-team" style="text-align:center;">
                        <span class="sp-sb-flag">${m.flagB || '🏳'}</span>
                        <div class="sp-sb-name">${m.teamB}</div>
                      </div>
                    </div>
                    <div class="sp-sb-detail" id="md-detail">${m.detail || ''}</div>
                    <div class="sp-sb-meta">
                      ${m.league ? `<span class="sp-sb-meta-pill">🏆 ${m.league}</span>` : ''}
                      ${m.format ? `<span class="sp-sb-meta-pill">📋 ${m.format}</span>` : ''}
                      ${m.startTime ? `<span class="sp-sb-meta-pill">🕐 ${formatStartTime(m.startTime)}</span>` : ''}
                    </div>
                    ${renderOdds(m)}
                  </div>
                </div>
              </section>

              <!-- Bottom content: commentary + stats -->
              <section style="padding:30px 0;">
                <div class="container">
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;">
                    <!-- Commentary -->
                    <div class="sp-commentary">
                      <div class="sp-commentary-header">
                        ${isLive ? '<span style="color:#ff3535;margin-right:4px;">🔴</span>' : '📝'} Commentary
                        ${isLive ? '<span style="font-size:0.72rem;color:#6b7280;margin-left:auto;font-weight:400;">Auto-refreshing</span>' : ''}
                      </div>
                      <div class="sp-commentary-feed" id="md-commentary">
                        ${renderCommentary(m.commentary)}
                      </div>
                    </div>

                    <!-- Stats -->
                    <div>
                      ${renderStats(m.stats, m.sport)}
                      ${!m.stats || !Object.keys(m.stats).length ? `<div style="text-align:center;padding:40px;color:#6b7280;font-size:0.85rem;">No match stats available yet.</div>` : ''}
                    </div>
                  </div>
                </div>
              </section>`;
        }

        // Start real-time listener
        ti = SportsDB.listenMatchById(matchId, renderMatch);

    })();
    </script>
</body>
</html>
