<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | SpinTask</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-body">

    <header class="top-header">
        <a href="dashboard.html" class="header-logo">
            <svg width="30" height="30" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="18" stroke="#39ff14" stroke-width="2" />
                <circle cx="20" cy="20" r="4" fill="#39ff14" />
            </svg>
            SpinTask<span>.</span>
        </a>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><span>🏠</span> Dashboard</a></li>
                    <li><a href="tasks.html"><span>📋</span> Tasks</a></li>
                    <li><a href="spin.html"><span>🎡</span> Spin Wheel</a></li>
                    <li><a href="luckydraw.html"><span>🎉</span> Lucky Draw</a></li>
                    <li><a href="pool.html"><span>👥</span> Community Pool</a></li>
                    <li><a href="plans.html"><span>🚀</span> Investment Plans</a></li>
                    <li><a href="referral.html"><span>🔗</span> Referrals</a></li>
                    <li><a href="deposit.html"><span>💰</span> Deposit</a></li>
                    <li><a href="withdraw.html"><span>💸</span> Withdraw</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" onclick="Auth.logout()"
                    style="color: #ff4d4d; font-size: 0.9rem; padding: 0 15px;">Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2 style="font-size: 1.8rem;">My Profile</h2>
            </header>

            <div style="max-width: 800px; margin: 0 auto;">
                <div class="glass"
                    style="padding: 40px; border-radius: 20px; display: flex; align-items: center; gap: 30px; margin-bottom: 30px;">
                    <div id="profile-banner-avatar"
                        style="width: 100px; height: 100px; background: var(--primary-neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--bg-dark); font-weight: bold;">
                        U</div>
                    <div>
                        <h3 id="profile-banner-name" style="font-size: 1.5rem;">Demo User</h3>
                        <p id="profile-banner-email" style="color: var(--text-muted);">demo@example.com</p>
                        <div style="margin-top: 10px;">
                            <span
                                style="background: rgba(57, 255, 20, 0.1); color: var(--primary-neon); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;">Verified
                                Member</span>
                            <span
                                style="background: rgba(255, 255, 255, 0.05); color: var(--text-white); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-left: 10px;">User
                                ID: #88219</span>
                        </div>
                    </div>
                </div>

                <div class="glass" style="padding: 40px; border-radius: 20px;">
                    <h3 style="margin-bottom: 25px;">Account Settings</h3>
                    <form>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <div>
                                <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Full
                                    Name</label>
                                <input type="text" id="profile-name" value="Demo User"
                                    style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff;">
                            </div>
                            <div>
                                <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Email
                                    Address</label>
                                <input type="email" id="profile-email" value="demo@example.com" readonly
                                    style="width: 100%; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; color: var(--text-muted);">
                            </div>
                        </div>
                        <div style="margin-bottom: 30px;">
                            <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">New
                                Password</label>
                            <input type="password" placeholder="Leave blank to keep current"
                                style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff;">
                        </div>
                        <button type="button" class="btn btn-primary" onclick="alert('Profile updated!')">Update
                            Profile</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    <script src="js/notifications.js"></script>
    <script>
        // Set dynamic user data in form
        const user = Auth.getCurrentUser();
        if (user) {
            document.getElementById('profile-name').value = user.name;
            document.getElementById('profile-email').value = user.email;
            document.getElementById('profile-banner-name').innerText = user.name;
            document.getElementById('profile-banner-email').innerText = user.email;
            document.getElementById('profile-banner-avatar').innerText = user.name.charAt(0).toUpperCase();
        }
    </script>
</body>

</html>
