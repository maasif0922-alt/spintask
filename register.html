<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SpinTask</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
    <!-- Back Button -->
    <a href="index.html" class="glass"
        style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; border-radius: 10px; display: flex; align-items: center; gap: 8px; color: #fff; text-decoration: none; font-size: 0.9rem; z-index: 10; transition: background 0.3s ease;">
        <span style="font-size: 1.2rem;">←</span> Back to Home
    </a>

    <div class="container"
        style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 0;">
        <div class="glass" style="width: 100%; max-width: 450px; padding: 40px; border-radius: 20px;">

            <div id="error-msg"
                style="background: #ff4d4d; color: #fff; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; display: none;">
            </div>
            <div id="success-msg"
                style="background: var(--primary-neon); color: var(--bg-dark); padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; display: none; font-weight: 600;">
            </div>

            <div style="text-align: center; margin-bottom: 30px;">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 10px;">
                    <svg width="30" height="30" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="#39ff14" stroke-width="2" />
                        <circle cx="20" cy="20" r="4" fill="#39ff14" />
                    </svg>
                    SpinTask<span>.</span>
                </a>
                <h2 style="font-size: 1.5rem;">Create Your Account</h2>
                <p style="color: var(--text-muted);">Start earning USDT with simple tasks</p>
            </div>

            <form id="register-form">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Full
                        Name</label>
                    <input type="text" id="name" required placeholder="John Doe"
                        style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; transition: var(--transition);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label
                        style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Email
                        Address</label>
                    <input type="email" id="email" required placeholder="name@example.com"
                        style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; transition: var(--transition);">
                </div>
                <div style="margin-bottom: 15px;">
                    <label
                        style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                    <input type="password" id="password" required placeholder="Min 6 characters" minlength="6"
                        style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; transition: var(--transition);">
                </div>
                <div style="margin-bottom: 20px;">
                    <label
                        style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Confirm
                        Password</label>
                    <input type="password" id="confirm-password" required placeholder="Re-enter password"
                        style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; transition: var(--transition);">
                </div>

                <div style="margin-bottom: 25px; display: flex; align-items: flex-start; gap: 10px;">
                    <input type="checkbox" required style="margin-top: 4px;">
                    <p style="font-size: 0.8rem; color: var(--text-muted);">I agree to the <a href="terms.html"
                            style="color: var(--primary-neon);">Terms of Service</a> and <a href="terms.html"
                            style="color: var(--primary-neon);">Privacy Policy</a>.</p>
                </div>

                <button type="submit" id="reg-btn" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div
                style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--text-muted); position: relative;">
                <span style="background: var(--bg-dark); padding: 0 10px; position: relative; z-index: 1;">OR CONTINUE
                    WITH</span>
                <div
                    style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.1);">
                </div>
            </div>

            <button type="button" onclick="showGoogleModal()" class="btn btn-outline"
                style="width: 100%; margin-top: 15px; border-color: rgba(255,255,255,0.15); color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease;">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="18"> Continue with
                Google
            </button>

            <div style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary-neon);">Login here</a>
            </div>

            <!-- Google Modal -->
            <div id="google-modal"
                style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center;">
                <div class="glass"
                    style="width:100%; max-width:380px; padding:35px; border-radius:20px; border:1px solid rgba(255,255,255,0.15);">
                    <div style="text-align:center; margin-bottom:25px;">
                        <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="40"
                            style="margin-bottom:10px;">
                        <h3 style="font-size:1.2rem;">Sign up with Google</h3>
                        <p style="color:var(--text-muted); font-size:0.85rem; margin-top:6px;">Enter your Google account
                            details</p>
                    </div>
                    <div id="google-modal-error"
                        style="background:#ff4d4d; color:#fff; padding:8px 15px; border-radius:8px; margin-bottom:15px; display:none; font-size:0.85rem;">
                    </div>
                    <div style="margin-bottom:15px;">
                        <label
                            style="display:block; margin-bottom:6px; font-size:0.85rem; color:var(--text-muted);">Full
                            Name</label>
                        <input type="text" id="g-name" placeholder="Your full name"
                            style="width:100%; padding:11px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:8px; color:#fff; outline:none;">
                    </div>
                    <div style="margin-bottom:20px;">
                        <label
                            style="display:block; margin-bottom:6px; font-size:0.85rem; color:var(--text-muted);">Gmail
                            Address</label>
                        <input type="email" id="g-email" placeholder="yourname@gmail.com"
                            style="width:100%; padding:11px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:8px; color:#fff; outline:none;">
                    </div>
                    <button onclick="googleSignIn()" class="btn btn-primary"
                        style="width:100%; margin-bottom:12px;">Create Account &amp; Sign In</button>
                    <button onclick="closeGoogleModal()" class="btn btn-outline"
                        style="width:100%; font-size:0.85rem;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const regBtn = document.getElementById('reg-btn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (password !== confirmPass) {
                errorMsg.innerText = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            regBtn.disabled = true;
            regBtn.innerText = 'Creating Account...';

            try {
                // Delay for UX
                await new Promise(r => setTimeout(r, 800));

                const urlParams = new URLSearchParams(window.location.search);
                const refCode = urlParams.get('ref');

                await Auth.register(name, email, password, refCode);

                successMsg.innerText = 'Registration successful! Redirecting to login...';
                successMsg.style.display = 'block';

                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = 'block';
                regBtn.disabled = false;
                regBtn.innerText = 'Create Account';
            }
        });
    </script>
</body>

</html>
