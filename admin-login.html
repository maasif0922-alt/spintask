<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SpinTask</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-neon: #39ff14;
            --bg-dark: #0a0b1e;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1b3a 0%, #0a0b1e 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(57, 255, 20, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .admin-badge {
            background: var(--primary-neon);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-neon);
            outline: none;
            background: rgba(255, 255, 255, 0.1);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }

        .glow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(57, 255, 20, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="glow-overlay"></div>
    <div class="login-card glass">
        <div class="admin-badge">ADMIN ACCESS</div>
        <h2 style="margin-bottom: 10px; font-size: 2rem;">Secure Login</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem;">Identity verification required for
            management access.</p>

        <form id="admin-login-form">
            <div id="login-error" class="error-msg">Invalid administrator credentials.</div>

            <div class="input-group">
                <label>Admin Email</label>
                <input type="email" id="email" value="admin@spintask.com" required>
            </div>

            <div class="input-group">
                <label>Access Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; margin-top: 10px; padding: 15px;">INITIALIZE SESSION</button>
        </form>

        <p style="margin-top: 25px; font-size: 0.8rem; color: #555;">
            &copy; 2026 SpinTask Security Shield. Unauthorized access is logged and reported.
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in as admin
        const currentUser = Auth.getCurrentUser();
        if (currentUser && currentUser.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const res = await Auth.login(email, password);
                if (res.success && res.user.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorEl.innerText = "Access Denied: Account does not have administrator privileges.";
                    errorEl.style.display = 'block';
                    // Logout to clear any partial session
                    Auth.logout();
                }
            } catch (err) {
                errorEl.innerText = err.message;
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
